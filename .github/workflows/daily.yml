name: Daily Trading Job

on:
  schedule:
    # 每天 08:40 UTC ≈ 每天 16:40 台北
    - cron: "40 8 * * *"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run daily job
        env:
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          DISCORD_WEEKLY_WEBHOOK: ${{ secrets.DISCORD_WEEKLY_WEBHOOK }}
          DISCORD_POSITION_WEBHOOK: ${{ secrets.DISCORD_POSITION_WEBHOOK }}
          DISCORD_EXIT_WEBHOOK: ${{ secrets.DISCORD_EXIT_WEBHOOK }}
        run: |
          python jobs/daily_after_close.py

      - name: Commit portfolio state if changed
        run: |
          if git status --porcelain | grep -q "portfolio_breakout_institutional.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add portfolio_breakout_institutional.json
            git commit -m "Update breakout portfolio state [skip ci]" || echo "No changes to commit"
            git push
          fi
