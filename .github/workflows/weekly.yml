name: Weekly Industry Report

on:
  schedule:
    # 每週一 01:00 UTC ≈ 台北時間週一 09:00
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  weekly_report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Send weekly industry recommendation
        env:
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          DISCORD_WEEKLY_WEBHOOK: ${{ secrets.DISCORD_WEEKLY_WEBHOOK }}
        run: |
          python - << 'PY'
          import os
          from datetime import date
          from jobs.weekly_recommendation import send_weekly_recommendation_to_discord

          d = date.today().strftime("%Y-%m-%d")
          url = os.environ["DISCORD_WEEKLY_WEBHOOK"]
          send_weekly_recommendation_to_discord(d, webhook_url=url)
          PY
